services:
  api:
    image: atcr.io/cuducos.me/minha-receita:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_HOST: ${DOMAIN}
      CACHE_SIZE: ${CACHE_SIZE}
      BLOOM_FILTER_SIZE: ${BLOOM_FILTER_SIZE}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8000/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  graph:
    image: atcr.io/cuducos.me/minha-receita:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_HOST: ${DOMAIN}
    command: ["graph", "--skip-create"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8000/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.31.1-trixie
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - graph
