services:

  minha-receita:
    build: .
    restart: unless-stopped
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./data:/mnt/data

  postgres:
    image: postgres:18-trixie
    ports:
      - 5432:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql
    environment: &credentials
      POSTGRES_PASSWORD: minhareceita
      POSTGRES_USER: minhareceita
      POSTGRES_DB: minhareceita
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U $${POSTGRES_USER}'"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.16
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@minhareceita.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin-local}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "true"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres_test:
    image: postgres:18-trixie
    ports:
      - 5555:5432
    environment: *credentials
    command: ["postgres", "-c", "log_statement=all"]

  mongo:
    image: mongo:8.0-noble
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: minhareceita
      MONGO_INITDB_ROOT_PASSWORD: minhareceita
    volumes:
      - ./data/mongodb:/data/db
    ports:
      - "27017:27017"

  mongo_test:
    image: mongo:8.0-noble
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: minhareceita
      MONGO_INITDB_ROOT_PASSWORD: minhareceita
    ports:
      - "27117:27017"

  provision_test:
    image: debian:trixie-slim
    ports:
      - "2222:22"
    volumes:
      - ~/.ssh:/tmp/host-ssh:ro
    command:
      - bash
      - -c
      - |
        apt-get update &&
        apt-get install -y openssh-server sudo &&
        mkdir -p /root/.ssh /run/sshd &&
        ssh-keygen -A &&
        sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        cat /tmp/host-ssh/*.pub > /root/.ssh/authorized_keys &&
        chown root:root /root/.ssh/authorized_keys &&
        chmod 600 /root/.ssh/authorized_keys &&
        /usr/sbin/sshd -D

volumes:
  pgadmin_data:
