app = 'minha-receita-graph'
primary_region = 'ams'

[build]
  image = 'registry.fly.io/minha-receita-graph:202606.1'

[env]
  PORT = '8888'

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = "30s"
  interval = "1m"
  method = "GET"
  timeout = "3s"
  path = "/healthz"

[[vm]]
  size = 'shared-cpu-2x'
